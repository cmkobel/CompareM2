# Resources
cores: all

# Policies
keep-going: true 
rerun-incomplete: true
show-failed-logs: false
rerun-triggers: "mtime" # Only rerun on changes in modification time. Not on code hash changes.
keep-incomplete: false #false # true for debugging. Must be false for production, otherwise the user might get confusing --rerun-incomplete queries.
rerun-incomplete: true


# Software deployment
software-deployment-method:
  - conda
conda-prefix: '~/.comparem2/conda'







resources:
  - downloads=10
#  - mem_mb=512000
  
