[workspace]
channels = ["conda-forge", "bioconda"]
name = "comparem2"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test-fast = "rm -rf cm2_test-fast; ./comparem2 --config output_directory='cm2_test-fast' input_genomes='tests/E._faecium/*.fna' --until fast"

[dependencies]
snakemake = "<10"
snakemake-executor-plugin-cluster-generic = "*"
mamba = "*"
conda = "*"
pandas = "*"
